<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skydive Sussex — Gear Service</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0e1117;--surface:#161b25;--surface2:#1e2535;--border:rgba(255,255,255,0.08);
    --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.15);--green:#22c55e;--green-dim:rgba(34,197,94,0.12);
    --red:#ef4444;--red-dim:rgba(239,68,68,0.12);--yellow:#f59e0b;--yellow-dim:rgba(245,158,11,0.12);
    --text:#f1f5f9;--text-dim:#94a3b8;--text-muted:#475569;--accent:#60a5fa;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
  .header{background:linear-gradient(135deg,#0a0f1e,#0e1628,#0a1520);border-bottom:1px solid var(--border);}
  .header-inner{max-width:700px;margin:0 auto;padding:24px 20px;display:flex;align-items:center;gap:16px;}
  .header-logo{width:48px;height:48px;background:linear-gradient(135deg,var(--blue),#1d4ed8);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 20px rgba(59,130,246,0.3);flex-shrink:0;}
  .header-text h1{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;line-height:1;}
  .header-text p{font-size:11px;color:var(--text-dim);margin-top:3px;}
  .main{max-width:700px;margin:0 auto;padding:28px 16px 60px;}
  .screen{display:none;}.screen.active{display:block;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px;}
  .card-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
  .serial-wrap{text-align:center;padding:20px 0 10px;}
  .serial-wrap h2{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;margin-bottom:8px;}
  .serial-wrap p{color:var(--text-dim);font-size:14px;margin-bottom:28px;}
  .serial-input-row{display:flex;gap:10px;max-width:420px;margin:0 auto;}
  .serial-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:15px;padding:13px 16px;transition:border-color 0.2s;}
  .serial-input:focus{outline:none;border-color:var(--blue);}
  .btn{border:none;border-radius:8px;padding:12px 22px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:opacity 0.2s;}
  .btn:hover{opacity:0.85;}
  .btn-primary{background:var(--blue);color:#fff;}
  .btn-full{width:100%;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;padding:15px;border-radius:10px;background:linear-gradient(135deg,var(--blue),#1d4ed8);color:#fff;box-shadow:0 4px 20px rgba(59,130,246,0.3);}
  .btn-full:hover{transform:translateY(-1px);}
  .btn-full:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .gear-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .gear-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1.5px;line-height:1;}
  .gear-sub{font-size:12px;color:var(--text-dim);margin-top:3px;}
  .type-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
  .badge-student{background:var(--blue-dim);color:var(--accent);border:1px solid rgba(59,130,246,0.3);}
  .badge-tandem{background:rgba(168,85,247,0.12);color:#c084fc;border:1px solid rgba(168,85,247,0.3);}
  .gear-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
  @media(max-width:500px){.gear-grid{grid-template-columns:1fr;}}
  .gear-section{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 14px;}
  .gs-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:9px;}
  .gs-field{margin-bottom:5px;}
  .gs-label{font-size:10px;color:var(--text-muted);}
  .gs-val{font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;}
  .repack-bar{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:14px;}
  .repack-ok{background:var(--green-dim);border:1px solid rgba(34,197,94,0.25);color:var(--green);}
  .repack-soon{background:var(--yellow-dim);border:1px solid rgba(245,158,11,0.25);color:var(--yellow);}
  .repack-over{background:var(--red-dim);border:1px solid rgba(239,68,68,0.25);color:var(--red);}
  .repack-unknown{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);}
  .notes-bar{background:var(--yellow-dim);border:1px solid rgba(245,158,11,0.25);border-radius:10px;padding:12px 14px;margin-bottom:14px;color:var(--yellow);font-size:13px;}
  .notes-bar-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
  .services-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
  @media(max-width:500px){.services-grid{grid-template-columns:1fr;}}
  .svc-item{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:border-color 0.15s,background 0.15s;user-select:none;}
  .svc-item:hover{border-color:rgba(59,130,246,0.4);}
  .svc-item input{display:none;}
  .svc-item.checked{background:var(--blue-dim);border-color:rgba(59,130,246,0.5);}
  .svc-check{width:18px;height:18px;border:2px solid var(--text-muted);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
  .svc-item.checked .svc-check{background:var(--blue);border-color:var(--blue);}
  .svc-check::after{content:'✓';font-size:11px;color:#fff;display:none;}
  .svc-item.checked .svc-check::after{display:block;}
  .svc-label{font-size:13px;line-height:1.3;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:6px;}
  .field input,.field textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:11px 14px;transition:border-color 0.2s;}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--blue);}
  .field textarea{resize:vertical;min-height:80px;}
  .success-wrap{text-align:center;padding:50px 20px;}
  .success-icon{font-size:52px;margin-bottom:18px;}
  .success-title{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:2px;color:var(--green);margin-bottom:8px;}
  .success-wo{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--accent);margin-bottom:8px;}
  .success-sub{color:var(--text-dim);font-size:14px;margin-bottom:28px;}
  .success-back{display:inline-block;padding:12px 28px;background:var(--blue-dim);border:1px solid rgba(59,130,246,0.4);color:var(--accent);border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;cursor:pointer;}
  .error-msg{background:var(--red-dim);border:1px solid rgba(239,68,68,0.3);color:var(--red);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none;}
</style>
</head>

const SERVICES = ["Reserve Inspection & Repack (Sport) - $115","Reserve Inspection & Repack (Tandem) - $150","Inspect Main or Reserve - $25","Inspect Harness / Container - $20","Inspect & Pack Pilot's Emergency Rig - $120","Pack Main Sport - $15","Pack Main Tandem - $20","AAD Batteries / Service - Varies","Install AAD - $10","Reserve Safety Stow Replacement - $12","Replace Lower Steering Lines - $40","Replace Steering Lines Toggles to Cascades - $65","Full Line Set - Varies","Re-line Sport - $130","Re-line Tandem - $175","Slinks - $35","Assembly, Inspection & Pack Reserve (Sport) - $140","Assembly, Inspection & Repack Reserve (Tandem) - $175","Assembly, Inspection & Pack Main - $75","Disassemble Main or Reserve - $10","Install Slider Bumpers - $25","Fabric Tensile Test - $20","Kill Line Replacement - $25","BOC Replacement - $100","Tack Slinks / Links - $5","Wash Rig - $65","Sewing - $85/hr","Canopy Patch - Varies","Monthly Maintenance"];
let currentGear = null;

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function showErr(el,msg){el.textContent=msg;el.style.display='block';}

function lookupSerial(){
  const val=document.getElementById('serial-input').value.trim();
  const errEl=document.getElementById('serial-error');
  errEl.style.display='none';
  if(!val){showErr(errEl,'Please enter a serial number.');return;}
  const gear=GEAR_DATA.find(g=>String(g.rig_sn).replace('.0','').toLowerCase()===val.toLowerCase());
  if(!gear){showErr(errEl,'No gear found with serial number "'+val+'". Please check and try again.');return;}
  currentGear=gear;
  renderGear(gear);
  buildServices();
  showScreen('screen-form');
  window.scrollTo(0,0);
}

document.getElementById('serial-input').addEventListener('keydown',e=>{if(e.key==='Enter')lookupSerial();});
(function(){const sn=new URLSearchParams(window.location.search).get('sn');if(sn){document.getElementById('serial-input').value=sn;lookupSerial();}})();

function renderGear(g){
  document.getElementById('gc-title').textContent=g.type==='tandem'?'RIG #'+g.rig_num:g.rig_num;
  document.getElementById('gc-sub').textContent=g.rig_make+' · S/N: '+String(g.rig_sn).replace('.0','');
  const badge=document.getElementById('gc-badge');
  badge.textContent=g.type==='student'?'Student Rig':'Tandem Rig';
  badge.className='type-badge '+(g.type==='student'?'badge-student':'badge-tandem');
  const rb=document.getElementById('repack-bar');
  if(!g.res_repack_due){rb.className='repack-bar repack-unknown';rb.textContent='📋 Reserve repack due date unknown';}
  else{
    const diff=Math.round((new Date(g.res_repack_due)-new Date())/86400000);
    if(diff<0){rb.className='repack-bar repack-over';rb.textContent='🚨 RESERVE OVERDUE — Was due '+g.res_repack_due+' ('+Math.abs(diff)+' days ago)';}
    else if(diff<=30){rb.className='repack-bar repack-soon';rb.textContent='⚠ Repack due soon — '+g.res_repack_due+' ('+diff+' days)';}
    else{rb.className='repack-bar repack-ok';rb.textContent='✓ Reserve current — Due '+g.res_repack_due+' ('+diff+' days)';}
  }
  const nb=document.getElementById('notes-bar');
  const notes=[g.notes,g.notes2,g.needed_parts].filter(Boolean).join('\n');
  if(notes.trim()){nb.style.display='block';nb.innerHTML='<div class="notes-bar-title">⚠ Outstanding Notes</div>'+notes.replace(/\n/g,'<br>');}
  else{nb.style.display='none';}
  const grid=document.getElementById('gear-grid');grid.innerHTML='';
  [{title:'Container',fields:[['Make',g.rig_make],['S/N',String(g.rig_sn).replace('.0','')],['DOM',g.rig_dom]]},
   {title:'Main Canopy',fields:[['Make',g.main_make],['Size',g.main_size?g.main_size.replace('.0','')+' sqft':''],['S/N',g.main_sn],['Color',g.main_color]]},
   {title:'Reserve',fields:[['Make',g.res_make],['Size',g.res_size?g.res_size.replace('.0','')+' sqft':''],['S/N',g.res_sn?String(g.res_sn).replace('.0',''):''],['Last Pack',g.res_pack_date],['Due',g.res_repack_due]]},
   {title:'AAD',fields:[['Make',g.aad_make],['S/N',g.aad_sn?String(g.aad_sn).replace('.0',''):''],['DOM',g.aad_dom],g.jumps?['Jumps',g.jumps]:null].filter(Boolean)}
  ].forEach(s=>{
    const div=document.createElement('div');div.className='gear-section';
    div.innerHTML='<div class="gs-title">'+s.title+'</div>'+s.fields.map(f=>f[1]?`<div class="gs-field"><div class="gs-label">${f[0]}</div><div class="gs-val">${f[1]}</div></div>`:'').join('');
    grid.appendChild(div);
  });
}

function buildServices(){
  const grid=document.getElementById('services-grid');grid.innerHTML='';
  SERVICES.forEach(svc=>{
    const label=document.createElement('label');label.className='svc-item';
    label.innerHTML=`<input type="checkbox" name="services[]" value="${svc}"><div class="svc-check"></div><span class="svc-label">${svc}</span>`;
    label.addEventListener('click',function(){const cb=this.querySelector('input');cb.checked=!cb.checked;this.classList.toggle('checked',cb.checked);});
    grid.appendChild(label);
  });
}

async function submitRequest(){
  const errEl=document.getElementById('form-error');errEl.style.display='none';
  const checked=[...document.querySelectorAll('input[name="services[]"]:checked')].map(c=>c.value);
  const notes=document.getElementById('extra-notes').value.trim();
  if(checked.length===0&&!notes){showErr(errEl,'Please select at least one service or add notes.');return;}
  const btn=document.getElementById('submit-btn');btn.disabled=true;btn.textContent='Submitting…';
  const woNum='SSX-'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'-'+Math.floor(Math.random()*9000+1000);
  const payload={action:'addPending',work_order:woNum,submitted_at:new Date().toISOString(),gear_type:currentGear.type,rig_num:currentGear.rig_num,rig_make:currentGear.rig_make,rig_sn:String(currentGear.rig_sn).replace('.0',''),res_repack_due:currentGear.res_repack_due||'',services:checked.join(' | '),extra_notes:notes,status:'PENDING'};
  try{await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});}catch(e){console.log(e);}
  document.getElementById('success-wo').textContent='Work Order #'+woNum;
  btn.disabled=false;btn.textContent='▶ Submit Service Request';
  showScreen('screen-success');window.scrollTo(0,0);
}

function resetAll(){
  currentGear=null;
  document.getElementById('serial-input').value='';
  document.getElementById('serial-error').style.display='none';
  document.getElementById('extra-notes').value='';
  showScreen('screen-serial');window.scrollTo(0,0);
}
</script>
